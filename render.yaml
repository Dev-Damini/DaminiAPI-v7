services:
  # ─── Frontend (Static Vite/React) ───────────────────────────────────────────
  - type: web
    name: damini-api-frontend
    env: static
    buildCommand: bun run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ─── Backend (Node.js Proxy Layer) ──────────────────────────────────────────
  - type: web
    name: damini-api-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000
